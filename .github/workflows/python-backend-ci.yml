name: Python Backend CI

on:
  push:
    branches:
      - master
      - "codex/**"
  pull_request:

jobs:
  backend-python:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyBuilder
        run: python -m pip install --upgrade pip pybuilder

      - name: Run unit tests and coverage
        working-directory: backend_python_app
        run: pyb
